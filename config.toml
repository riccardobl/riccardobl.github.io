baseURL = "/"
locale = "en-US"
title = "RBLB"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  avatar="https://github.com/riccardobl.png"
  avatarCache="/images/avatar.webp"
  favicon = "favicon.png"
  description = ""
  github = "https://github.com/riccardobl"
  email="c@rblb.it"
  custom_css = ["/css/style.css"]
  custom_js=["/js/script.js"]
  revtag="/revtag.jpg"
  lightningAddress="zap@rblb.it"
  lightningSmallAmountAddress="rblb@blink.sv"
  lightningSmallAmountMax=2100
  liquidAddress="VJLAHvECLkNcafF2JoBZaPy3Xy6AzWJhn6PNbqzBZHZMNdjTmZYfrtiyvoivhr7inwnNbbvFJH8swFD8"
  bitcoinAddress="bc1qr2jc865yp089mr3tyd3jk65w0k6stx4j6t5qrj"
  coffeeCost=1700
  zapDefaultReason="rblb"
  zapNeedInvoiceSignature=false
  pgpPubKey="/gpg_pub_riccardoblb.asc"
  zapDefaultNet="lightning"

  [params.githubShowcase]
    owners = ["riccardobl", "NostrGameEngine"]
    repos = ["jMonkeyEngine/jmonkeyengine", "lnbits/nwcprovider"]
    starredBy = "riccardobl"
    ignoredLanguages = ["C#", "Dockerfile", "Jupyter Notebook", "Makefile", "Ruby", "Swift", "WebAssembly", "Rust", "Go"]

  [[params.featuredProjects]]
    title = "jMonkeyEngine"
    kicker = "Game engine"
    image = "/images/jmonkeyengine-showcase.jpg"
    summary = "A historic 21+ year Java 3D engine project where I contribute as a core developer."
    url = "https://jmonkeyengine.org/"
    repo = "jMonkeyEngine/jmonkeyengine"

  [[params.featuredProjects]]
    title = "Nostr Game Engine"
    kicker = "Game engine"
    image = "/images/nge.jpg"
    summary = "A Java engine and application framework for Nostr and Bitcoin-native apps."
    url = "https://ngengine.org/"
    repo = "NostrGameEngine/ngengine"

  [[params.featuredProjects]]
    title = "libJGLIOS"
    kicker = "Java on iOS"
    image = "/images/libjglios.svg"
    imageFit = "contain"
    summary = "An iOS support stack for Java apps with SDL3, OpenAL, OpenGL ES, ANGLE/Metal and GraalVM Native Image."
    url = "https://github.com/NostrGameEngine/libJGLIOS"
    repo = "NostrGameEngine/libJGLIOS"

  [[params.featuredProjects]]
    title = "Hypergate"
    kicker = "P2P networking"
    image = "/images/hypergate.svg"
    imageFit = "contain"
    summary = "A zero-configuration encrypted tunnel for connecting containers and machines across NAT."
    url = "https://github.com/riccardobl/hypergate"
    repo = "riccardobl/hypergate"

  [[params.featuredProjects]]
    title = "Nostr4J"
    kicker = "Nostr library"
    image = "/images/nostr4j.svg"
    imageFit = "contain"
    summary = "A Java Nostr client library with Blossom, wallets, and WebRTC over Nostr for p2p apps."
    url = "https://github.com/NostrGameEngine/nostr4j"
    repo = "NostrGameEngine/nostr4j"

  [[params.featuredProjects]]
    title = "Nostrduino"
    kicker = "Embedded Nostr"
    image = "/images/nostrduino.svg"
    imageFit = "contain"
    summary = "A Nostr library for Arduino and microcontrollers, including Nostr Wallet Connect support."
    url = "https://github.com/riccardobl/nostrduino"
    repo = "riccardobl/nostrduino"

  [[params.featuredProjects]]
    title = "NWC Provider"
    kicker = "Wallet integration"
    image = "/images/nwcprovider.svg"
    imageFit = "contain"
    summary = "An LNbits plugin that adds Nostr Wallet Connect support for wallet and payment flows."
    url = "https://github.com/lnbits/nwcprovider"
    repo = "lnbits/nwcprovider"

  [[params.featuredProjects]]
    title = "Shop La Rabiosa"
    kicker = "E-commerce"
    image = "/images/shop.larabiosa.it/feature.webp"
    imagePosition = "top center"
    summary = "A serverless e-commerce site built for an Italian wine producer, covering catalog, checkout and payment processor integration."

[outputs]
  home = ["HTML"]
